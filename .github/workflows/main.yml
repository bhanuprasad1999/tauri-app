name: Build APK
on: push
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
      - name: Build APK
        run: |
          npm install
          npx tauri android init
          PROGUARD_PATH="src-tauri/gen/android/app/proguard-rules.pro"
          mkdir -p $(dirname "$PROGUARD_PATH")
          echo "-keep class app.tauri.** { *; }" > $PROGUARD_PATH
          echo "-keep class com.demo.app.** { *; }" >> $PROGUARD_PATH
          npx tauri android build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: src-tauri/gen/android/**/build/outputs/apk/**/*.apk
          if-no-files-found: error